<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羅馬大獎賽 — 膳食費紀錄</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a56db;--blue-dark:#1341b0;--blue-light:#e8f0fe;
  --green:#1D9E75;--red:#E24B4A;
  --gray-100:#f1f3f4;--gray-200:#e8eaed;--gray-400:#9aa0a6;
  --gray-600:#5f6368;--gray-800:#3c4043;--gray-900:#202124;
  --white:#ffffff;--radius:8px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--gray-100);color:var(--gray-900);min-height:100vh;padding:1.5rem 1rem 4rem;line-height:1.6}
.wrap{max-width:820px;margin:0 auto}
.page-header{background:var(--blue);border-radius:var(--radius) var(--radius) 0 0;padding:1.5rem 1.75rem;color:#fff;border-top:5px solid #0d3a8e}
.page-header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.page-header p{font-size:13px;opacity:.85}
.card{background:var(--white);border:1px solid var(--gray-200);border-top:none;padding:1.25rem 1.75rem}
.card:last-child{border-radius:0 0 var(--radius) var(--radius)}
.tab-wrap{display:flex;gap:4px;margin-bottom:1.25rem}
.tab{background:none;border:1px solid var(--gray-200);border-radius:6px;padding:6px 16px;font-size:13px;cursor:pointer;color:var(--gray-600);font-family:'Noto Sans TC',sans-serif}
.tab.active{background:var(--gray-900);color:#fff;border-color:var(--gray-900)}
.section-title{font-size:14px;font-weight:700;color:var(--blue);border-bottom:2px solid var(--blue-light);padding-bottom:8px;margin-bottom:1rem}
.row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:.85rem}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:12px;color:var(--gray-600);font-weight:500}
.field input,.field select,.field textarea{border:none;border-bottom:1px solid var(--gray-400);background:transparent;padding:7px 2px;font-size:13px;font-family:'Noto Sans TC',sans-serif;color:var(--gray-900);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-bottom:2px solid var(--blue)}
.field textarea{resize:vertical;min-height:52px;border:1px solid var(--gray-200);border-radius:4px;padding:6px 8px}
.field textarea:focus{border-color:var(--blue);outline:none}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
.badge-ap{background:#e8f0fe;color:#0C447C}
.badge-gold{background:#FAEEDA;color:#633806}
.btn{background:var(--blue);color:#fff;border:none;border-radius:4px;padding:7px 20px;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:background .2s}
.btn:hover{background:var(--blue-dark)}
.btn:disabled{background:var(--gray-400);cursor:not-allowed}
.btn-ghost{background:none;border:1px solid var(--gray-200);border-radius:4px;padding:6px 14px;font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;color:var(--gray-600)}
.btn-ghost:hover{border-color:var(--gray-400);color:var(--gray-900)}
.copy-btn{background:var(--gray-100);border:1px solid var(--gray-200);border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;color:var(--gray-600);font-family:'Noto Sans TC',sans-serif;white-space:nowrap}
.copy-btn:hover{border-color:var(--blue);color:var(--blue)}
.copy-btn:disabled{opacity:.4;cursor:not-allowed}
.upload-box{border:1.5px dashed var(--gray-400);border-radius:var(--radius);padding:7px 12px;font-size:12px;color:var(--gray-600);display:flex;align-items:center;gap:6px;cursor:pointer;position:relative;overflow:hidden;min-width:160px;transition:border-color .2s,background .2s}
.upload-box:hover{border-color:var(--blue);background:var(--blue-light)}
.upload-box.has-file{border-color:var(--green);color:var(--green);background:#f0fdf8}
.upload-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.receipt-thumb{max-width:100%;max-height:200px;border-radius:6px;border:1px solid var(--gray-200);display:block;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 8px;color:var(--gray-600);font-weight:500;border-bottom:1px solid var(--gray-200);white-space:nowrap;background:var(--gray-100)}
td{padding:7px 8px;border-bottom:1px solid var(--gray-200);color:var(--gray-900);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.del-btn{background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:4px}
.del-btn:hover{color:var(--red);background:#fff0f0}
.view-btn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;padding:2px 6px;text-decoration:underline;font-family:'Noto Sans TC',sans-serif}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:1rem}
.metric{background:var(--gray-100);border-radius:var(--radius);padding:.85rem 1rem}
.metric-label{font-size:11px;color:var(--gray-600);margin-bottom:4px}
.metric-val{font-size:21px;font-weight:500}
.metric-val.ok{color:var(--green)}
.metric-val.warn{color:var(--red)}
.remaining.ok{color:var(--green);font-weight:500}
.remaining.warn{color:var(--red);font-weight:500}
.msg{font-size:12px;min-height:18px;margin-top:6px}
.msg.ok{color:var(--green)}
.msg.err{color:var(--red)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:var(--radius);padding:1.25rem;max-width:520px;width:92%;position:relative}
.modal img{max-width:100%;max-height:65vh;border-radius:6px;display:block;margin:0 auto}
.modal-close{position:absolute;top:10px;right:12px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-600)}
.progress-wrap{display:none;width:100%;margin-top:.5rem}
.progress-wrap.show{display:block}
.progress-bar{height:4px;background:var(--gray-200);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;width:0%}
.progress-text{font-size:12px;color:var(--gray-600);margin-top:4px}
@media(max-width:600px){.row{flex-direction:column;align-items:stretch}.card{padding:1rem}}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-header">
    <h1>羅馬大獎賽 — 膳食費紀錄</h1>
    <p>亞培：NT$1,350 × 9 天 = NT$12,150/人　｜　黃金：NT$244,116／人</p>
  </div>

  <div class="card">
    <div class="tab-wrap">
      <button class="tab active" onclick="switchTab('add',this)">＋ 新增消費</button>
      <button class="tab" onclick="switchTab('log',this)">消費紀錄</button>
      <button class="tab" onclick="switchTab('summary',this)">結算總覽</button>
    </div>

    <!-- 新增消費 -->
    <div id="tab-add">
      <div class="section-title">新增一筆消費</div>
      <div class="row">
        <div class="field">
          <label>人員</label>
          <select id="sel-person" style="min-width:140px" onchange="onPersonChange()"></select>
        </div>
        <div class="field" style="justify-content:flex-end">
          <button class="copy-btn" id="copy-prev-btn" onclick="copyPrev()" disabled>⇅ 與前一位相同</button>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>日期</label>
          <input type="date" id="inp-date" style="width:145px">
        </div>
        <div class="field">
          <label>金額（NT$）</label>
          <input type="number" id="inp-amount" placeholder="0" style="width:115px" min="0">
        </div>
        <div class="field" style="flex:1;min-width:160px">
          <label>說明</label>
          <input type="text" id="inp-desc" placeholder="早餐、午餐、晚餐…">
        </div>
      </div>
      <div class="row" style="align-items:center">
        <div class="field">
          <label>上傳收據</label>
          <div class="upload-box" id="upload-box">
            📎 <span id="upload-label">點擊上傳圖片或 PDF</span>
            <input type="file" id="inp-receipt" accept="image/*,.pdf" onchange="onFileChange(this)">
          </div>
        </div>
        <button class="btn-ghost" id="clear-file-btn" onclick="clearFile()" style="display:none;align-self:flex-end">清除收據</button>
      </div>
      <div id="receipt-preview-wrap"></div>
      <div class="row" style="margin-top:.75rem">
        <button class="btn" id="submit-btn" onclick="addEntry()">新增並儲存</button>
      </div>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">處理中…</div>
      </div>
      <div class="msg" id="add-msg"></div>
    </div>

    <!-- 消費紀錄 -->
    <div id="tab-log" style="display:none">
      <div class="section-title">所有消費紀錄</div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>日期</th><th>人員</th><th>計畫</th><th>說明</th>
            <th style="text-align:right">金額</th><th>收據</th><th></th>
          </tr></thead>
          <tbody id="log-body"></tbody>
        </table>
        <div id="log-empty" style="text-align:center;padding:2rem;color:var(--gray-600);font-size:13px">尚無消費紀錄</div>
      </div>
    </div>

    <!-- 結算總覽 -->
    <div id="tab-summary" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <div class="section-title" style="margin-bottom:0">各人員結算</div>
        <button class="btn" id="sync-btn" onclick="syncSummary()" style="font-size:12px;padding:6px 16px">⬆ 更新結算到試算表</button>
      </div>
      <div id="sync-msg" class="msg" style="margin-bottom:.5rem"></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>姓名</th><th>職稱</th><th>計畫</th>
            <th style="text-align:right">預算</th>
            <th style="text-align:right">已用</th>
            <th style="text-align:right">剩餘</th>
          </tr></thead>
          <tbody id="sum-body"></tbody>
        </table>
      </div>
      <div class="summary-grid" id="total-cards"></div>
    </div>
  </div>
</div>

<!-- 收據大圖 Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <img id="modal-img" src="" alt="收據預覽">
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby2Tse97mnklXuRWxomB_RCXxkVhn99OaGvDy_UgAVUGJsRKWSxdJThYAZ7BdjNlW2QOg/exec';

const PEOPLE = [
  {name:'蘇泰源',role:'教練',gender:'男',plan:'亞培'},
  {name:'朱建安',role:'教練',gender:'男',plan:'亞培'},
  {name:'林若薇',role:'教練',gender:'女',plan:'亞培'},
  {name:'吳思嫻',role:'翻譯兼管理',gender:'女',plan:'黃金芸2'},
  {name:'陳麒丰',role:'防護員',gender:'男',plan:'黃金芸2'},
  {name:'林儀昀',role:'防護員',gender:'女',plan:'亞培'},
  {name:'潘奎安',role:'選手',gender:'男',plan:'亞培'},
  {name:'徐晧祐',role:'選手',gender:'男',plan:'亞培'},
  {name:'潘奎恩',role:'選手',gender:'男',plan:'黃金芸2'},
  {name:'葉奇勳',role:'選手',gender:'男',plan:'黃金均3'},
  {name:'洪俊義',role:'選手',gender:'男',plan:'亞培'},
  {name:'劉侑芸',role:'選手',gender:'女',plan:'黃金芸2'},
  {name:'林唯均',role:'選手',gender:'女',plan:'黃金均3'},
  {name:'張芮恩',role:'選手',gender:'女',plan:'亞培'},
];
const AP_PER = 1350*9;
// 黃金每人固定 244116
const GOLD_PER = 244116;
function getBudget(p){ return p.plan==='亞培'?AP_PER:GOLD_PER; }

// 從 localStorage 讀取紀錄（重新整理不會消失）
let entries = [];
try {
  const saved = localStorage.getItem('roma_meal_entries');
  if(saved) entries = JSON.parse(saved);
} catch(e){ entries=[]; }
let currentReceiptDataUrl = null;
let currentReceiptMime = '';
let currentReceiptName = '';

function saveEntries(){
  try { localStorage.setItem('roma_meal_entries', JSON.stringify(entries)); } catch(e){}
}

// 初始化人員下拉
const sel = document.getElementById('sel-person');
PEOPLE.forEach(p=>{
  const o = document.createElement('option');
  o.value = p.name;
  o.textContent = p.name+'（'+p.role+'）';
  sel.appendChild(o);
});
document.getElementById('inp-date').value = new Date().toISOString().slice(0,10);

function onPersonChange(){
  document.getElementById('copy-prev-btn').disabled = entries.length===0;
}

function copyPrev(){
  if(entries.length===0) return;
  const last = entries[entries.length-1];
  document.getElementById('inp-date').value = last.date;
  document.getElementById('inp-amount').value = last.amount;
  document.getElementById('inp-desc').value = last.desc;
  if(last.receiptDataUrl){
    currentReceiptDataUrl = last.receiptDataUrl;
    currentReceiptMime = last.receiptMime;
    currentReceiptName = last.receiptName;
    document.getElementById('upload-label').textContent = last.receiptName;
    document.getElementById('upload-box').classList.add('has-file');
    document.getElementById('clear-file-btn').style.display='';
    if(last.receiptMime.startsWith('image/')){
      document.getElementById('receipt-preview-wrap').innerHTML =
        '<img class="receipt-thumb" src="'+last.receiptDataUrl+'" alt="收據預覽">';
    } else {
      document.getElementById('receipt-preview-wrap').innerHTML =
        '<div style="font-size:12px;color:var(--green);margin-top:6px">📄 '+last.receiptName+'（PDF）</div>';
    }
  }
  const msg = document.getElementById('add-msg');
  msg.className='msg ok';
  msg.textContent='✓ 已複製前一筆資料，目前人員為「'+sel.value+'」，確認後按新增並儲存';
  setTimeout(()=>{msg.textContent='';},3500);
}

function onFileChange(input){
  if(!input.files||!input.files[0]) return;
  const file = input.files[0];
  currentReceiptMime = file.type||'application/octet-stream';
  currentReceiptName = file.name;
  document.getElementById('upload-label').textContent = file.name;
  document.getElementById('upload-box').classList.add('has-file');
  document.getElementById('clear-file-btn').style.display='';
  const reader = new FileReader();
  reader.onload = e=>{
    currentReceiptDataUrl = e.target.result;
    if(file.type.startsWith('image/')){
      document.getElementById('receipt-preview-wrap').innerHTML =
        '<img class="receipt-thumb" src="'+e.target.result+'" alt="收據預覽">';
    } else {
      document.getElementById('receipt-preview-wrap').innerHTML =
        '<div style="font-size:12px;color:var(--green);margin-top:6px">📄 '+file.name+'（PDF）</div>';
    }
  };
  reader.readAsDataURL(file);
}

function clearFile(){
  currentReceiptDataUrl=null; currentReceiptMime=''; currentReceiptName='';
  document.getElementById('inp-receipt').value='';
  document.getElementById('upload-label').textContent='點擊上傳圖片或 PDF';
  document.getElementById('upload-box').classList.remove('has-file');
  document.getElementById('clear-file-btn').style.display='none';
  document.getElementById('receipt-preview-wrap').innerHTML='';
}

function setProgress(pct,text){
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=text;
}

async function addEntry(){
  const person = sel.value;
  const date   = document.getElementById('inp-date').value;
  const amount = parseFloat(document.getElementById('inp-amount').value);
  const desc   = document.getElementById('inp-desc').value.trim();
  const msg    = document.getElementById('add-msg');

  if(!date||isNaN(amount)||amount<=0){
    msg.className='msg err'; msg.textContent='請填寫日期與金額'; return;
  }

  const p = PEOPLE.find(x=>x.name===person);
  const btn = document.getElementById('submit-btn');
  btn.disabled=true;
  document.getElementById('progress-wrap').classList.add('show');
  setProgress(10,'準備資料…');

  // 準備 payload
  const fields = { date, person, role:p.role, plan:p.plan, desc, amount };
  let receipt = null;
  if(currentReceiptDataUrl){
    setProgress(30,'處理收據…');
    const base64 = currentReceiptDataUrl.split(',')[1];
    receipt = { data:base64, mimeType:currentReceiptMime, name:currentReceiptName };
  }

  setProgress(55,'上傳至 Google Drive…');

  try {
    const res = await fetch(APPS_SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({fields, receipt})
    });
    setProgress(85,'寫入試算表…');
    const json = await res.json();

    if(json.result==='success'){
      setProgress(100,'完成！');
      // 本地也記一筆（供結算用）
      entries.push({
        person, date, amount, desc,
        plan:p.plan, role:p.role,
        receiptDataUrl:currentReceiptDataUrl,
        receiptMime:currentReceiptMime,
        receiptName:currentReceiptName,
        receiptUrl: json.receiptUrl||''
      });
      entries.sort((a,b)=>a.date.localeCompare(b.date));
      saveEntries();
      clearFile();
      document.getElementById('inp-amount').value='';
      document.getElementById('inp-desc').value='';
      document.getElementById('copy-prev-btn').disabled=false;
      renderLog(); renderSummary();
      msg.className='msg ok';
      msg.textContent='✓ 已儲存：'+person+' NT$'+amount.toLocaleString()+'　收據已上傳 Drive 並寫入試算表';
      setTimeout(()=>{
        msg.textContent='';
        document.getElementById('progress-wrap').classList.remove('show');
        setProgress(0,'');
      },3000);
    } else {
      msg.className='msg err';
      msg.textContent='儲存失敗：'+(json.message||'請稍後再試');
      setProgress(0,'');
      document.getElementById('progress-wrap').classList.remove('show');
    }
  } catch(err){
    msg.className='msg err';
    msg.textContent='連線失敗，請檢查網路後重試。';
    setProgress(0,'');
    document.getElementById('progress-wrap').classList.remove('show');
  }
  btn.disabled=false;
}

function deleteEntry(i){
  entries.splice(i,1);
  saveEntries();
  renderLog(); renderSummary();
  if(entries.length===0) document.getElementById('copy-prev-btn').disabled=true;
}

function planBadge(plan){
  const cls=plan==='亞培'?'badge-ap':'badge-gold';
  return '<span class="badge '+cls+'">'+plan+'</span>';
}

function renderLog(){
  const tbody=document.getElementById('log-body');
  const empty=document.getElementById('log-empty');
  if(entries.length===0){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=entries.map((e,i)=>`
    <tr>
      <td>${e.date}</td>
      <td style="font-weight:500">${e.person}</td>
      <td>${planBadge(e.plan)}</td>
      <td style="color:var(--gray-600)">${e.desc||'—'}</td>
      <td style="text-align:right;font-weight:500">NT$${e.amount.toLocaleString()}</td>
      <td>${
        e.receiptUrl
          ? '<a href="'+e.receiptUrl+'" target="_blank" style="color:var(--blue);font-size:12px">查看收據</a>'
          : e.receiptDataUrl && !e.receiptDataUrl.startsWith('pdf:')
            ? '<button class="view-btn" onclick="viewReceipt('+i+')">預覽</button>'
            : e.receiptDataUrl
              ? '<span style="font-size:12px;color:var(--gray-600)">📄 PDF</span>'
              : '<span style="color:var(--gray-400);font-size:12px">—</span>'
      }</td>
      <td><button class="del-btn" onclick="deleteEntry(${i})" title="刪除">✕</button></td>
    </tr>`).join('');
}

function viewReceipt(i){
  const e=entries[i];
  if(!e.receiptDataUrl) return;
  document.getElementById('modal-img').src=e.receiptDataUrl;
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal(ev){if(ev.target===document.getElementById('modal-bg'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-bg').classList.remove('show');}

function renderSummary(){
  const tbody = document.getElementById('sum-body');
  const plans = ['亞培','黃金芸2','黃金均3','運動部潛優'];
  const planLabels = {'亞培':'亞培計畫','黃金芸2':'黃金芸2計畫','黃金均3':'黃金均3計畫','運動部潛優':'運動部潛優計畫'};
  let tB=0, tS=0;
  let html = '';

  plans.forEach(plan => {
    const group = PEOPLE.filter(p => p.plan === plan);
    if(group.length === 0) return;
    let gB=0, gS=0;

    // 計畫標題列
    html += `<tr style="background:var(--blue-light)">
      <td colspan="6" style="font-weight:700;color:var(--blue);padding:8px 8px 6px;font-size:13px">
        ${planBadge(plan)} ${planLabels[plan]}
      </td>
    </tr>`;

    group.forEach(p => {
      const budget = getBudget(p);
      const spent  = entries.filter(e=>e.person===p.name).reduce((s,e)=>s+e.amount,0);
      const rem    = budget - spent;
      gB += budget; gS += spent; tB += budget; tS += spent;
      const cls = rem >= 0 ? 'ok' : 'warn';
      html += `<tr>
        <td style="font-weight:500;padding-left:16px">${p.name}</td>
        <td style="color:var(--gray-600)">${p.role}</td>
        <td>${planBadge(p.plan)}</td>
        <td style="text-align:right">NT$${budget.toLocaleString()}</td>
        <td style="text-align:right">NT$${spent.toLocaleString()}</td>
        <td style="text-align:right" class="remaining ${cls}">NT$${rem.toLocaleString()}</td>
      </tr>`;
    });

    // 計畫小計列
    const gR = gB - gS;
    html += `<tr style="background:#f8f9fa;border-top:1px solid var(--gray-200)">
      <td colspan="3" style="font-weight:500;color:var(--gray-600);padding-left:16px;font-size:12px">小計</td>
      <td style="text-align:right;font-weight:500">NT$${gB.toLocaleString()}</td>
      <td style="text-align:right;font-weight:500">NT$${gS.toLocaleString()}</td>
      <td style="text-align:right;font-weight:700" class="remaining ${gR>=0?'ok':'warn'}">NT$${gR.toLocaleString()}</td>
    </tr>`;
  });

  tbody.innerHTML = html;

  const tR = tB - tS;
  document.getElementById('total-cards').innerHTML=`
    <div class="metric"><div class="metric-label">總預算</div><div class="metric-val">NT$${tB.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">已使用</div><div class="metric-val warn">NT$${tS.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">剩餘</div><div class="metric-val ${tR>=0?'ok':'warn'}">NT$${tR.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">人數</div><div class="metric-val">${PEOPLE.length} 人</div></div>
  `;
}

async function syncSummary(){
  const btn = document.getElementById('sync-btn');
  const msg = document.getElementById('sync-msg');
  btn.disabled = true;
  btn.textContent = '同步中…';

  const summaryData = PEOPLE.map(p => {
    const budget = getBudget(p);
    const spent  = entries.filter(e=>e.person===p.name).reduce((s,e)=>s+e.amount,0);
    return {
      name: p.name, role: p.role, plan: p.plan,
      budget, spent, remaining: budget - spent
    };
  });

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type':'text/plain'},
      body: JSON.stringify({ action:'updateSummary', summaryData })
    });
    const json = await res.json();
    if(json.result==='success'){
      msg.className='msg ok';
      msg.textContent='✓ 結算已同步到試算表「結算總覽」分頁';
      setTimeout(()=>{ msg.textContent=''; },4000);
    } else {
      msg.className='msg err';
      msg.textContent='同步失敗：'+(json.message||'請稍後再試');
    }
  } catch(err) {
    msg.className='msg err';
    msg.textContent='連線失敗，請檢查網路後重試。';
  }
  btn.disabled = false;
  btn.textContent = '⬆ 更新結算到試算表';
}

function switchTab(name, btn){
  ['add','log','summary'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===name ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(name==='log') renderLog();
  if(name==='summary') renderSummary();
}

renderSummary();
</script>
